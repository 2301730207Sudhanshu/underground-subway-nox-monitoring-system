<!DOCTYPE html>
<html>
<head>
    <title>ML Prediction App</title>
</head>
<body>

    <h2>ML Model Prediction</h2>

    <form id="predictionForm">
        <label>Feature 1:</label><br>
        <input type="number" step="any" id="f1" required><br><br>

        <label>Feature 2:</label><br>
        <input type="number" step="any" id="f2" required><br><br>

        <label>Feature 3:</label><br>
        <input type="number" step="any" id="f3" required><br><br>

        <label>Feature 4:</label><br>
        <input type="number" step="any" id="f4" required><br><br>

        <button type="submit">Predict</button>
    </form>

    <h3 id="result"></h3>

    <script>
        document.getElementById("predictionForm").addEventListener("submit", async function(e) {
            e.preventDefault();

            const features = [
                parseFloat(document.getElementById("f1").value),
                parseFloat(document.getElementById("f2").value),
                parseFloat(document.getElementById("f3").value),
                parseFloat(document.getElementById("f4").value)
            ];

            const response = await fetch("http://127.0.0.1:5000/predict", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ features: features })
            });

            const data = await response.json();

            if (data.prediction !== undefined) {
                document.getElementById("result").innerText = "Prediction: " + data.prediction;
            } else {
                document.getElementById("result").innerText = "Error: " + data.error;
            }
        });
    </script>

</body>
</html>
